services:
  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8081:8081"
    networks:
      - microservices-network
    environment:
      - GIT_USER=${GIT_USER}
      - GIT_PASSWORD=${GIT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-service:
    build: ./eureka-service
    container_name: eureka-service
    ports:
      - "8099:8099"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-microservices:
    build: ./admin-microservices
    container_name: admin-microservices
    ports:
      - "8086:8086"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user:
    build: ./user
    container_name: user
    ports:
      - "8093:8093"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      admin-microservices:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL_USER=${DATABASE_URL_USER}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  attendance:
    build: ./attendance
    container_name: attendance
    ports:
      - "8094:8094"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      admin-microservices:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - JWT_SECRET=${JWT_SECRET}
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
      - SEPOLIA_PRIVATE_KEY=${SEPOLIA_PRIVATE_KEY}
      - ATTENDANCE_CONTRACT_ADDRESS=${ATTENDANCE_CONTRACT_ADDRESS}
      - DATABASE_URL_ATTENDANCE=${DATABASE_URL_ATTENDANCE}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  evaluation:
    build: ./evaluation
    container_name: evaluation
    ports:
      - "8091:8091"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      admin-microservices:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL_EVALUATION=${DATABASE_URL_EVALUATION}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification:
    build: ./notification
    container_name: notification
    ports:
      - "8092:8092"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      admin-microservices:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DATABASE_URL_NOTIFICATION=${DATABASE_URL_NOTIFICATION}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api-gateway
    container_name: api
    ports:
      - "8080:8080"
    networks:
      - microservices-network
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      admin-microservices:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT}

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  microservices-network:
    driver: bridge